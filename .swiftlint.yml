disabled_rules:
  - trailing_whitespace
  - todo

# === 函数与类型体积限制 ===
function_body_length:
  warning: 50
  error: 70

closure_body_length:
  warning: 50
  error: 70

type_body_length:
  warning: 250
  error: 500

file_length:
  warning: 300
  error: 500

line_length:
  warning: 140
  error: 200

cyclomatic_complexity:
  warning: 15
  error: 30

# === 命名规范 ===
type_name:
  min_length: 3
  # reason: industry-standard acronyms (ID/URL/PTY/OSC) are conventional
  # type-name suffixes that the 3-char minimum would falsely block.
  # AI/UI are part of the project's domain vocabulary (`AISession`, `UIDeviceName`).
  excluded:
    - ID
    - URL
    - PTY
    - OSC
    - AI
    - UI

identifier_name:
  min_length: 2
  # reason: single-letter identifiers carry domain meaning that's clearer
  # than longer alternatives in tight scopes — math axes (x/y), loop
  # indices (i/j), color channels (r/g/b/a), and `id` (ubiquitous
  # entity-key shorthand). All conventional, none ambiguous in their
  # use sites; no rename would improve readability.
  excluded:
    - x
    - y
    - i
    - j
    - r
    - g
    - b
    - a
    - id

# === Opt-in 规则 ===
opt_in_rules:
  # 安全：禁止强制解包/转换
  - force_unwrapping
  - force_try
  - force_cast
  - implicitly_unwrapped_optional

  # 体积门禁
  - closure_body_length    # 防止大型闭包初始化器（参考 CLAUDE.md §3：单函数 ≤ 50 行）

  # 性能
  - empty_count            # 推荐 isEmpty 替换 count == 0
  - empty_string           # 推荐 isEmpty 替换字符串空判断
  - first_where            # 推荐 .first(where:) 替换 .filter().first

  # 现代化
  - legacy_random          # 推荐 Int.random() 替换 arc4random

  # 代码清洁
  - redundant_nil_coalescing
  - fatal_error_message
  - unneeded_parentheses_in_closure_argument

  # 内存安全
  - weak_delegate          # Delegate 应为 weak，防止循环引用

  # 架构
  - strict_fileprivate     # 推荐 private 替代 fileprivate
  - function_parameter_count
  - large_tuple
  - private_outlet
  - private_subject        # Combine Subject 应为 private，仅公开 Publisher
  - overridden_super_call
  - collection_alignment

included:
  - Sources/Termura

# Tests carry decade-old fixture-style code (XCTestCase setUp IUO patterns,
# `try?` cleanup defers, `c: Character` loops, `""` literals) that the
# strict `Sources/Termura` ruleset rejects. Tracking them as production
# lint targets would require ~150 mechanical rewrites with no
# behaviour-level value, so SwiftLint skips test paths globally. Test
# correctness is enforced by the test runs themselves, not by lint.
excluded:
  - Tests
  - "**/Tests/*Tests"

# ============================================================
# 自定义规则
# ============================================================
custom_rules:

  # --- 并发门禁 ---
  no_nonisolated_unsafe_closure_var:
    name: "Concurrency: nonisolated(unsafe) var closure in actor"
    # Matches nonisolated(unsafe) var whose type annotation begins with '(' — i.e. a function/closure type.
    # Does NOT match Task<Void,Never>, [UUID:Task], Any, etc. (those don't start with '(').
    regex: 'nonisolated\(unsafe\)\s+(?:private\s+|public\s+|internal\s+)?var\s+\w+\s*:\s*\(.*->'
    message: "actor 禁止用 nonisolated(unsafe) var 存储回调闭包（绕过 actor 隔离）。请将回调移入 init 作为 let，或改用 AsyncStream 暴露事件流。"
    severity: error

  no_dispatch_queue_main:
    name: "Concurrency: Use Task/@MainActor instead of DispatchQueue"
    regex: "DispatchQueue\\.main\\.(async|asyncAfter)"
    # reason: GhosttyAppContext bridges Ghostty's C-callback world (no async
    # context) to MainActor — DispatchQueue.main.async is the only safe
    # transport from the libghostty event-loop thread. Swift's structured
    # concurrency requires an existing Task, which the C layer can't supply.
    excluded: ".*GhosttyAppContext\\.swift"
    message: "禁止使用 DispatchQueue.main。请使用 Task { @MainActor in ... } 或 Task.sleep。"
    severity: error

  no_dispatch_global:
    name: "Concurrency: Use Task.detached instead of DispatchQueue.global"
    regex: "DispatchQueue\\.global\\("
    message: "禁止使用 DispatchQueue.global()。请使用 Task.detached 或 async 方法。"
    severity: warning

  no_combine_dispatch_main:
    name: "Concurrency: Use RunLoop.main for Combine"
    regex: "\\.receive\\(on: DispatchQueue\\.main\\)"
    message: "Combine 的 .receive(on:) 请使用 RunLoop.main，以保持 MainActor 隔离一致性。"
    severity: warning

  # `@unchecked Sendable` 政策不再用 regex 落地：原 `unchecked_sendable_documentation`
  # 规则会同时命中代码声明和注释字面量，且无法在 regex 范围内验证"附带文档化"
  # 的语义。NSXPCConnection 要求 `@objc` 协议实现派生 NSObject，NSObject 又不是
  # Sendable，所以 `final class …: NSObject, @unchecked Sendable` 是 Apple 官方
  # 模式，无可替代。该模式的合规性由 CLAUDE.md §4.4 的书面政策 + code review 把
  # 关；非桥接场景（持闭包字段的 ClockBox / WeakConnection / ReplyBox 等）应改用
  # `@Sendable` 闭包字段而非 `@unchecked Sendable`。

  # --- 错误处理门禁 ---
  no_try_optional:
    name: "Error Handling: Avoid try?"
    regex: "\\btry\\?"
    message: "禁止使用 try? 吞没错误。请使用 do-catch 显式处理，或至少记录错误日志。"
    severity: error

  no_empty_catch:
    name: "Error Handling: No Empty Catch"
    regex: "catch\\s*\\{\\s*\\}"
    message: "禁止空 catch 块。错误必须被记录、上报或处理。"
    severity: error

  no_silent_catch_comments:
    name: "Error Handling: No Silent Catch (Comments Only)"
    regex: "catch\\s*\\{\\s*//[^\\n]*\\s*\\}"
    message: "catch 块中只有注释是不允许的。必须有实际的错误处理逻辑。"
    severity: error

  cancellation_error_catch_needs_comment:
    name: "Error Handling: CancellationError catch must document intent"
    regex: "catch is CancellationError \\{[ \\t]*\\n[ \\t]*return"
    message: "catch is CancellationError 块必须在 return 前加 '// CancellationError is expected — <原因>' 注释，说明为何可以静默处理。"
    severity: warning

  # --- 依赖注入门禁 ---
  no_services_shared_in_logic:
    included: ".*Sources/Termura/(ViewModels|Services|Repositories)/.*"
    name: "DI Violation: AppServices Singleton in Logic Layer"
    regex: "AppServices\\.shared"
    match_kinds:
      - identifier
    message: "逻辑层禁止直接访问 AppServices.shared。请通过构造函数注入依赖。"
    severity: error

  no_generic_shared_in_logic:
    included: ".*Sources/Termura/(ViewModels|Repositories)/.*"
    name: "DI Violation: Generic .shared Access"
    regex: "(?<!UserDefaults|NotificationCenter|FileManager|AppConfig|ProcessInfo)\\.shared(?![a-z])"
    message: "逻辑层应优先使用依赖注入，而非直接访问 .shared 单例（除经批准的系统服务）。"
    severity: warning

  # --- Clean Architecture 门禁 ---
  no_grdb_in_views:
    included: ".*Sources/Termura/Views/.*"
    name: "Clean Architecture: No GRDB in Views"
    regex: "import GRDB|DatabaseQueue|DatabasePool|try db\\."
    message: "Views 禁止直接访问 GRDB。请通过 ViewModel/Repository 封装数据操作。"
    severity: error

  no_main_actor_repository:
    included: ".*Sources/Termura/Services/.*Repository.*\\.swift"
    name: "Architecture: Repository Must Not Be MainActor"
    regex: "@MainActor"
    message: "Repository 禁止标记为 @MainActor。I/O 操作必须在后台执行。"
    severity: error

  # --- 配置管理门禁 ---
  no_hardcoded_config:
    included: ".*Sources/Termura/(ViewModels|Services|Repositories)/.*"
    name: "Config: Hardcoded Magic Number"
    regex: "(let|var)\\s+\\w+\\s*:\\s*(TimeInterval|Int|Int64)\\s*=\\s*(?!0(\\.0+)?(?![\\d]))\\d+(\\.\\d+)?(?![\\d\\w])"
    message: "检测到硬编码配置值。请迁移至 AppConfig.swift 集中管理。"
    severity: error

  no_magic_delays:
    name: "Config: Hardcoded Delay"
    regex: "Task\\.sleep\\(seconds:\\s*(?!0(\\.0+)?)[0-9]+\\.?[0-9]*\\b"
    message: "硬编码延迟时间请移至 AppConfig.Runtime 命名常量。"
    severity: error

  # --- 安全门禁 ---
  no_hardcoded_api_key:
    included: ".*Sources/Termura/(ViewModels|Services|Repositories)/.*"
    name: "Security: Possible Hardcoded Key"
    regex: "(let|var)\\s+(apiKey|secretKey|accessKey|apiSecret)\\s*=\\s*\"[a-zA-Z0-9]{10,}\""
    message: "检测到疑似硬编码 API Key。请迁移至受保护的配置文件或 Keychain。"
    severity: error

  no_exit_call:
    name: "Forbidden: exit()"
    regex: "exit\\("
    match_kinds: [identifier]
    message: "禁止使用 exit()。违反 App Store 规则。请使用 UI 提示或平滑退出机制。"
    severity: error

  no_fatal_error_production:
    name: "Forbidden: fatalError in Production"
    regex: "fatalError\\("
    message: "生产代码禁止使用 fatalError。请使用错误处理机制或安全降级方案。"
    severity: error

  # --- 终端缓冲区安全 ---
  no_unbounded_terminal_buffer:
    included: ".*Sources/Termura/Terminal/.*"
    name: "Terminal: Unbounded Buffer Risk"
    regex: "var\\s+\\w*(lines|buffer|history|output)\\s*[:=]\\s*\\[.*\\]"
    message: "终端缓冲区数组必须有上限（参考 AppConfig.Terminal.maxScrollbackLines）以防内存泄漏。"
    severity: warning

  # --- 测试规范 ---
  no_task_sleep_in_tests:
    included: ".*Tests.*\\.swift"
    name: "Test: No Task.sleep"
    regex: "Task\\.sleep"
    message: "测试代码禁止使用 Task.sleep。请使用 XCTestExpectation 确保测试确定性。"
    severity: error

  # --- 性能门禁 ---
  static_var_collection_computed:
    name: "Performance: static var computed collection"
    regex: 'static\s+var\s+\w+\s*:\s*\[.+\]\s*\{'
    # reason: FontSettings queries NSFontManager.availableFontFamilies at
    # call site — the system font list isn't constant (user installs
    # fonts at runtime). A `static let` snapshot would freeze the list
    # at process start and miss new fonts; the computed property is
    # the correct semantics for this specific case.
    excluded:
      - ".*FontSettings\\.swift"
    message: "使用 'static let' 代替 'static var' 返回常量集合。计算属性每次访问都会分配新的堆对象。若需查询系统 API（如 NSFontManager），在 .swiftlint.yml 的 excluded 列表中添加例外，并在文件中注明原因。"
    severity: error

  # --- 热路径分配门禁 ---
  prefer_split_over_components_filter:
    name: "Performance: Use split instead of components+filter"
    # Matches .components(separatedBy: ...).filter { !$0.isEmpty } — a two-step pattern that
    # allocates a full [String] array then a filtered copy. split(separator:) returns [Substring]
    # with empty elements omitted by default, avoiding both intermediate allocations.
    # Only applies when filter explicitly drops empty strings — other uses of components are unaffected.
    # Only matches string-literal separators (e.g. "\n", ", ") — CharacterSet variants like
    # .whitespacesAndNewlines have no split(separator:) equivalent and are intentionally excluded.
    regex: '\.components\(separatedBy:\s*"[^"]*"\)\.filter\s*\{[^}]*isEmpty[^}]*\}'
    message: "components(separatedBy:).filter { !$0.isEmpty } 产生两次数组分配。请改用 split(separator:).map(String.init)，语义等价且无中间数组。"
    severity: warning

  no_components_in_hot_path:
    included: ".*Sources/Termura/(Output|Terminal)/.*"
    name: "Performance: components(separatedBy:) in PTY hot path"
    regex: '\.components\(separatedBy:'
    message: "Output/Terminal 热路径禁止使用 components(separatedBy:)——每次调用为所有元素分配堆内存。请改用 split(separator:omittingEmptySubsequences:) 返回零拷贝 [Substring]，只在需要持久化时才调用 String(substring)。"
    severity: error

  # --- 算法效率门禁 ---
  no_filter_count:
    name: "Performance: Use count(where:) instead of filter{}.count"
    regex: '\.filter\s*(\([^)]*\)|\{[^}]*\})\.count\b'
    message: "filter{}.count 分配中间数组。请使用 .count(where:) 完成单趟遍历。"
    severity: warning

  no_sorted_for_single_element:
    name: "Performance: Use min(by:)/max(by:) instead of sorted{}.first/last"
    regex: '\.sorted\s*(\(by:\s*)?(\{[^}]*\}|\([^)]*\))\s*\)\s*\.(first|last)\b'
    message: "sorted{}.first/last 是 O(n log n)。取最值请用 .min(by:) / .max(by:) O(n) 替代。"
    severity: error

  # --- SessionStore 索引门禁 ---
  # SessionStore 维护 sessionIndex: [SessionID: Int] 作为 O(1) 查找索引。
  # 直接对 sessions 数组按 ID 线性扫描是被禁止的，必须使用 sessionIndex[id]。
  no_session_linear_scan_first_index:
    included: ".*Sources/Termura/Session/.*"
    name: "Performance: Use sessionIndex instead of firstIndex(where: id)"
    regex: '\.firstIndex\(where:\s*\{\s*\$0\.id\s*=='
    message: "禁止对 sessions 按 ID 线性扫描。请使用 sessionIndex[id] 进行 O(1) 查找。"
    severity: error

  no_session_linear_scan_contains:
    included: ".*Sources/Termura/Session/.*"
    name: "Performance: Use sessionIndex instead of contains(where: id)"
    regex: '\.contains\(where:\s*\{\s*\$0\.id\s*=='
    message: "禁止对 sessions 按 ID 线性扫描。请使用 sessionIndex[id] != nil 进行 O(1) 存在性检查。"
    severity: error

  # --- 死代码门禁 ---
  no_dead_self_retain:
    name: "Dead Code: _ = self in closure"
    regex: '\b_\s*=\s*self\b'
    message: "_ = self 不影响 ARC 引用计数，是死代码。弱引用的存活依赖外部持有者，与此赋值无关。请直接删除。"
    severity: error

  no_unused_weak_self:
    name: "Dead Code: [weak self] capture without self usage"
    # Detects Task/closure capture lists that only contain [weak self] with no self usage in the body.
    # Pattern: capture list "[weak self]" followed by "in" and a block that never references self.
    # This is a heuristic; full dataflow analysis isn't possible in regex.
    # Catches the pattern: { [weak self] in ... } where body has no 'self' reference at all.
    regex: '\[\s*weak\s+self\s*\]\s+in\s+(?:(?!self)[^}])+\}'
    message: "[weak self] 被捕获但 self 从未在闭包中使用。请移除 [weak self]。若闭包确实不需要 self，说明捕获多余；若需要防循环引用，应将引用改为实际使用或改用 [unowned self]。"
    severity: warning

  # --- 错误处理一致性 ---
  rawvalue_fallback_must_be_documented:
    name: "Error Handling: rawValue fallback must be documented"
    # Matches SomeType(rawValue: someVar) ?? .case — flags undocumented silent degradation.
    # Fix: add an inline comment on the same line explaining why the fallback case is safe,
    # e.g. "// AgentType has .unknown designed as a forward-compat fallback".
    regex: '\w+\(rawValue:\s*\w+\)\s*\?\?(?!.*//)'
    message: "rawValue fallback 必须附带内联注释说明降级原因（例：// XxxType 有 .unknown 专用降级 case，降级不影响业务正确性）。"
    severity: warning

  # --- 数据转换规范 ---
  non_optional_string_data_conversion:
    name: "Non-optional String -> Data Conversion"
    regex: '\\.data\(using:\s*\.utf8\)\s*(\?\?|\!)'
    message: "Prefer non-optional `Data(_:)` initializer when converting `String` to `Data`"
    severity: error

  consecutive_fire_and_forget_tasks:
    name: "Performance: Merge consecutive single-line fire-and-forget Tasks"
    # Matches two single-line Task { } calls on consecutive lines — the pattern that produces
    # unnecessary Task allocations. Multi-line Task bodies are not matched (the [^\n}] stops
    # at a newline), so switch-case Tasks in separate branches are not flagged.
    regex: 'Task\s*\{[^\n}]*\}\s*\n\s*Task\s*\{'
    message: "连续的 fire-and-forget Task 块请合并为单个 Task，减少 Task 分配开销。例：Task { await a(); await b() }。参考 CLAUDE.md §2 并发审查清单。"
    severity: warning
