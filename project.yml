name: Termura
options:
  bundleIdPrefix: com.termura
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "26.0"
  generateEmptyDirectories: true
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEAD_CODE_STRIPPING: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    LOCALIZATION_PREFERS_STRING_CATALOGS: YES

packages:
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm
    from: "1.3.0"
  Highlightr:
    url: https://github.com/raspu/Highlightr
    from: "2.2.0"
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: "7.0.0"
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: "2.0.0"

targets:
  Termura:
    type: application
    platform: macOS
    sources:
      - Sources/Termura
    resources:
      - Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.termura.app
        INFOPLIST_FILE: Resources/Info.plist
        ENTITLEMENTS_FILE_PATH: Resources/Termura.entitlements
        SWIFT_TREAT_WARNINGS_AS_ERRORS: YES
    dependencies:
      - package: SwiftTerm
        product: SwiftTerm
      - package: Highlightr
        product: Highlightr
      - package: GRDB
        product: GRDB
      - package: KeyboardShortcuts
        product: KeyboardShortcuts

  TermuraTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests/TermuraTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.termura.tests
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: Termura

schemes:
  Termura:
    build:
      targets:
        Termura: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - TermuraTests
    profile:
      config: Release
    archive:
      config: Release
