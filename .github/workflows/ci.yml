name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    name: Quality Gate (lint + baseline + open-core boundary)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install lint tooling
        run: brew install swiftlint swiftformat

      - name: Run quality gate
        run: bash scripts/quality-gate.sh --ci

  baseline-drift:
    name: Baseline drift (LEAK_PATTERN + snapshots)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Verify open-core baseline drift
        run: bash scripts/check-baseline-drift.sh

      - name: Verify open-core baseline snapshots
        run: bash scripts/check-baseline-snapshots.sh

  security:
    name: Security audit (secret scan)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Secret scanning (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
